name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.1.8) - will create tag and release'
        required: false
        default: ''
      skip_macos:
        description: 'Skip macOS build'
        type: boolean
        required: false
        default: false

env:
  CI: true
  R2_BUCKET: cc-desktop-releases
  OSS_DIR: hydrodesktop_update
  OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
  OSS_REGION: cn-hangzhou

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-windows:
    needs: test
    runs-on: windows-2025
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue
        run: npm run build:vue

      - name: Build Electron
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Windows installer package
        shell: pwsh
        run: |
          # 获取版本号
          $VERSION = (Get-Content package.json | ConvertFrom-Json).version
          $RELEASE_DIR = "cc-desktop-${VERSION}-windows"

          # 创建发布目录
          New-Item -ItemType Directory -Force -Path $RELEASE_DIR | Out-Null

          # 复制文件 - 查找 exe 文件（支持多种命名格式）
          $exeFile = Get-ChildItem -Path dist -Filter "*.exe" | Select-Object -First 1
          if ($exeFile) {
            Write-Host "Found installer: $($exeFile.Name)"
            Copy-Item $exeFile.FullName "$RELEASE_DIR\CC Desktop Setup ${VERSION}.exe"
          } else {
            Write-Error "No .exe file found in dist/"
            exit 1
          }
          Copy-Item "scripts\install.ps1" "$RELEASE_DIR\"

          # 创建 README
          @"
          # CC Desktop v${VERSION} - Windows Installer

          ## Quick Install (Recommended)

          Right-click PowerShell and "Run as Administrator", then:

          ``````powershell
          powershell -ExecutionPolicy Bypass -File .\install.ps1
          ``````

          This will:
          1. Check if Claude Code CLI is installed (install if not)
          2. Launch CC Desktop installer

          ## Manual Install

          Double-click ``CC Desktop Setup ${VERSION}.exe``
          "@ | Out-File -FilePath "$RELEASE_DIR\README.md" -Encoding UTF8

          # 打包
          Compress-Archive -Path $RELEASE_DIR -DestinationPath "dist\cc-desktop-${VERSION}-windows.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
            dist/cc-desktop-*-windows.zip
          if-no-files-found: ignore

  build-macos-arm64:
    needs: test
    runs-on: macos-15
    timeout-minutes: 30
    if: ${{ github.event.inputs.skip_macos != 'true' }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue
        run: npm run build:vue

      - name: Build Electron
        run: npx electron-builder --mac dmg zip --arm64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package macOS installer archives
        run: bash scripts/package-mac-installers.sh "$(node -p "require('./package.json').version")" dist arm64

      - name: Verify arm64 artifact architecture
        run: |
          APP_PATH="dist/mac-arm64/CC Desktop.app"
          test -d "$APP_PATH"
          find "$APP_PATH" -path "*sharp*" -type f -print0 | while IFS= read -r -d '' file; do
            INFO=$(file "$file")
            echo "$INFO"
            if echo "$INFO" | grep -q "x86_64"; then
              echo "Unexpected x64 sharp artifact inside arm64 app: $file"
              exit 1
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-arm64
          path: |
            dist/*darwin-arm64.dmg
            dist/*darwin-arm64.zip
            dist/*macos-arm64-installer.tar.gz
            dist/*darwin-arm64.dmg.blockmap
            dist/*darwin-arm64.zip.blockmap
            dist/latest-mac.yml
          if-no-files-found: ignore

  build-macos-x64:
    needs: test
    runs-on: macos-15-intel
    timeout-minutes: 30
    if: ${{ github.event.inputs.skip_macos != 'true' }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue
        run: npm run build:vue

      - name: Build Electron
        run: npx electron-builder --mac dmg zip --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package macOS installer archives
        run: bash scripts/package-mac-installers.sh "$(node -p "require('./package.json').version")" dist x64

      - name: Verify x64 artifact architecture
        run: |
          APP_PATH="dist/mac/CC Desktop.app"
          test -d "$APP_PATH"
          find "$APP_PATH" -path "*sharp*" -type f -print0 | while IFS= read -r -d '' file; do
            INFO=$(file "$file")
            echo "$INFO"
            if echo "$INFO" | grep -q "arm64"; then
              echo "Unexpected arm64 sharp artifact inside x64 app: $file"
              exit 1
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-x64
          path: |
            dist/*darwin-x64.dmg
            dist/*darwin-x64.zip
            dist/*macos-x64-installer.tar.gz
            dist/*darwin-x64.dmg.blockmap
            dist/*darwin-x64.zip.blockmap
            dist/latest-mac.yml
          if-no-files-found: ignore

  release:
    needs: [build-windows, build-macos-arm64, build-macos-x64]
    runs-on: ubuntu-latest
    # 触发条件：推送 tag 或手动触发时填写了版本号
    # Windows 必须成功，macOS 可以跳过（skip_macos）或成功
    if: ${{ always() && needs.build-windows.result == 'success' && ((needs.build-macos-arm64.result == 'success' && needs.build-macos-x64.result == 'success') || (needs.build-macos-arm64.result == 'skipped' && needs.build-macos-x64.result == 'skipped')) && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != '') }}

    permissions:
      contents: write

    steps:
      - name: Clean up draft releases
        run: |
          echo "Cleaning up draft releases..."
          DRAFTS=$(gh api repos/${{ github.repository }}/releases --jq '.[] | select(.draft==true) | .id')
          for id in $DRAFTS; do
            echo "Deleting draft release $id"
            gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
          done
          echo "Done. Deleted $(echo "$DRAFTS" | grep -c . || echo 0) draft(s)."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "number=${TAG#v}" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG, version number: ${TAG#v}"

      - name: Create tag (if manual trigger)
        if: ${{ github.event.inputs.version != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }} 2>/dev/null || true
          git push origin ${{ steps.version.outputs.tag }} 2>/dev/null || echo "Tag already exists, skipping push"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Merge macOS update metadata
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const arm64Path = path.join('artifacts', 'mac-build-arm64', 'latest-mac.yml');
          const x64Path = path.join('artifacts', 'mac-build-x64', 'latest-mac.yml');

          if (!fs.existsSync(arm64Path) || !fs.existsSync(x64Path)) {
            console.log('Skip merge: missing latest-mac.yml artifact');
            process.exit(0);
          }

          const arm64Content = fs.readFileSync(arm64Path, 'utf8');
          const x64Content = fs.readFileSync(x64Path, 'utf8');
          const filesBlockPattern = /files:\\n([\\s\\S]*?)\\npath:/;
          const arm64Match = arm64Content.match(filesBlockPattern);
          const x64Match = x64Content.match(filesBlockPattern);

          if (!arm64Match || !x64Match) {
            console.log('Skip merge: unable to locate files blocks');
            process.exit(0);
          }

          const extractEntries = (block) => {
            return block
              .split(/\\n(?=  - url: )/)
              .map((entry) => entry.trimEnd())
              .filter(Boolean);
          };

          const mergedEntries = [...extractEntries(arm64Match[1]), ...extractEntries(x64Match[1])];
          const seenUrls = new Set();
          const dedupedEntries = mergedEntries.filter((entry) => {
            const urlMatch = entry.match(/- url: (.+)/);
            if (!urlMatch) return false;
            const url = urlMatch[1].trim();
            if (seenUrls.has(url)) return false;
            seenUrls.add(url);
            return true;
          });

          const mergedFilesBlock = 'files:\\n' + dedupedEntries.join('\\n');
          const mergedContent = arm64Content.replace(filesBlockPattern, mergedFilesBlock + '\\npath:');

          fs.writeFileSync(arm64Path, mergedContent);
          fs.rmSync(x64Path, { force: true });
          console.log('Merged macOS metadata into', arm64Path);
          "

      - name: Extract changelog and inject release notes
        id: changelog
        run: |
          node -e "
          const fs = require('fs');
          const version = process.env.VERSION;

          // 从 CHANGELOG.md 提取当前版本的更新说明
          const changelog = fs.readFileSync('docs/CHANGELOG.md', 'utf8');
          const escaped = version.replace(/\./g, '\\\\.');
          const regex = new RegExp('## v' + escaped + '[^\\\\n]*\\\\n([\\\\s\\\\S]*?)(?=\\\\n## v|\\\\n---|$)');
          const match = changelog.match(regex);
          const notes = match ? match[1].trim() : '';

          if (!notes) {
            console.log('No changelog notes found for v' + version + ', skipping');
            // 写入空值，release body 会使用 fallback
            fs.appendFileSync(process.env.GITHUB_OUTPUT, 'notes=\n');
            process.exit(0);
          }
          console.log('Changelog notes (' + notes.length + ' chars): ' + notes.slice(0, 80) + '...');

          // 写入 GITHUB_OUTPUT（多行值用 delimiter）
          const delimiter = 'CHANGELOG_EOF_' + Date.now();
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'notes<<' + delimiter + '\n' + notes + '\n' + delimiter + '\n');

          // 注入到 latest-mac.yml 和 latest.yml（generic provider 从此字段读取更新说明）
          const ymlFiles = [
            'artifacts/mac-build-arm64/latest-mac.yml',
            'artifacts/win-build/latest.yml',
          ];
          for (const f of ymlFiles) {
            if (!fs.existsSync(f)) { console.log('Skip (not found):', f); continue; }
            let content = fs.readFileSync(f, 'utf8');
            content = content.replace(/^releaseNotes:.*\n/m, '');
            content = content.trimEnd() + '\nreleaseNotes: ' + JSON.stringify(notes) + '\n';
            fs.writeFileSync(f, content);
            console.log('Injected releaseNotes into:', f);
          }
          "
        env:
          VERSION: ${{ steps.version.outputs.number }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*-installer.tar.gz
            artifacts/**/*.blockmap
            artifacts/**/latest.yml
            artifacts/**/latest-mac.yml
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
          body: |
            ## 🚀 CC Desktop ${{ steps.version.outputs.tag }}

            ### 📝 更新内容

            ${{ steps.changelog.outputs.notes || '> 详情请查看 [CHANGELOG](docs/CHANGELOG.md)' }}

            ### 📦 一键安装

            #### Windows
            下载 `cc-desktop-*-windows.zip`，解压后右键 PowerShell "以管理员身份运行"：
            ```powershell
            powershell -ExecutionPolicy Bypass -File .\install.ps1
            ```

            #### macOS
            Apple Silicon 推荐下载 `cc-desktop-*-macos-arm64-installer.tar.gz`，解压后运行：
            ```bash
            bash install.sh
            ```

            Intel 推荐下载 `cc-desktop-*-macos-x64-installer.tar.gz`，解压后运行：
            ```bash
            bash install.sh
            ```

            如只需原始安装包，也可直接下载对应架构的 `dmg`

            ### 🇨🇳 镜像站下载（China Mirror）
            - 下载页：https://hdupdate.myseek.fun/hydrodesktop_update/index.html

            ### ✨ 功能特性
            - 三模式架构：开发者模式（CLI界面）+ Agent 模式（Chat界面）+ Notebook 模式
            - 多会话管理
            - 支持恢复历史会话
            - 内置 Agent 对话界面与 Notebook 工作台

            ### 📋 系统要求
            - **Windows**: Windows 10/11
            - **macOS**: 10.13+
            - Node.js, Claude Code CLI（安装脚本会自动检查和安装）
            - 运行 exe 或者 dmg 安装包时不自动检测，请提前手动安装 Node.js, Claude Code CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to R2 (China mirror)
        run: |
          echo "=== Uploading to Cloudflare R2 ==="
          VERSION="${{ steps.version.outputs.tag }}"

          # 清理旧的大文件（exe/dmg/zip），保留 blockmap（差分更新需要上一版本的 blockmap）
          echo "Cleaning old large files (keeping blockmaps)..."
          aws s3 ls "s3://${{ env.R2_BUCKET }}/" --endpoint-url "${{ secrets.R2_ENDPOINT }}" | \
            awk '{print $4}' | grep -v '\.blockmap$' | grep -v '\.yml$' | while read -r f; do
              [ -z "$f" ] && continue
              echo "Deleting: $f"
              aws s3 rm "s3://${{ env.R2_BUCKET }}/$f" --endpoint-url "${{ secrets.R2_ENDPOINT }}"
            done || true

          # 上传所有构建产物到 R2（flat 目录，electron-updater 需要）
          for f in artifacts/**/*.exe artifacts/**/*.dmg artifacts/**/*.zip artifacts/**/*-installer.tar.gz artifacts/**/*.blockmap artifacts/**/latest.yml artifacts/**/latest-mac.yml artifacts/**/cc-desktop-*-windows.zip; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            echo "Uploading: $BASENAME"
            aws s3 cp "$f" "s3://${{ env.R2_BUCKET }}/$BASENAME" \
              --endpoint-url "${{ secrets.R2_ENDPOINT }}"
          done

          # 生成下载引导页
          VER="${{ steps.version.outputs.number }}"
          cat > /tmp/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>CC Desktop 国内镜像下载</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f7f7f5; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
              .container { max-width: 600px; width: 90%; padding: 48px 40px; background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
              h1 { font-size: 24px; margin-bottom: 8px; }
              .version { color: #666; font-size: 14px; margin-bottom: 32px; }
              .section { margin-bottom: 24px; }
              .section h2 { font-size: 16px; color: #333; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
              a.dl { display: block; padding: 12px 16px; margin-bottom: 8px; background: #f5f5f0; border-radius: 8px; color: #1a1a1a; text-decoration: none; transition: background 0.2s; }
              a.dl:hover { background: #e8e8e0; }
              a.dl .name { font-weight: 600; }
              a.dl .hint { font-size: 13px; color: #888; }
              .tip { margin-top: 10px; font-size: 13px; line-height: 1.6; color: #666; }
              .tip code { padding: 1px 4px; border-radius: 4px; background: #f1f1eb; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
              .footer { margin-top: 32px; font-size: 13px; color: #999; text-align: center; }
              .footer a { color: #666; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>CC Desktop</h1>
              <div class="version">v${VER} · 国内镜像</div>
              <div class="section">
                <h2>Windows</h2>
                <a class="dl" href="CC-Desktop-${VER}-win32-x64.exe"><span class="name">CC-Desktop-${VER}-win32-x64.exe</span><br><span class="hint">安装包</span></a>
                <a class="dl" href="cc-desktop-${VER}-windows.zip"><span class="name">cc-desktop-${VER}-windows.zip</span><br><span class="hint">一键安装包（解压后运行 <code>install.ps1</code>）</span></a>
                <div class="tip">推荐普通用户下载一键安装包。解压后右键 PowerShell 以管理员身份运行 <code>install.ps1</code>，会先检查环境再启动安装。</div>
              </div>
              <div class="section">
                <h2>macOS</h2>
                <a class="dl" href="cc-desktop-${VER}-macos-arm64-installer.tar.gz"><span class="name">cc-desktop-${VER}-macos-arm64-installer.tar.gz</span><br><span class="hint">Apple Silicon 一键安装包（解压后运行 <code>install.sh</code>）</span></a>
                <a class="dl" href="CC-Desktop-${VER}-darwin-arm64.dmg"><span class="name">CC-Desktop-${VER}-darwin-arm64.dmg</span><br><span class="hint">Apple Silicon (M1/M2/M3/M4)</span></a>
                <a class="dl" href="cc-desktop-${VER}-macos-x64-installer.tar.gz"><span class="name">cc-desktop-${VER}-macos-x64-installer.tar.gz</span><br><span class="hint">Intel 一键安装包（解压后运行 <code>install.sh</code>）</span></a>
                <a class="dl" href="CC-Desktop-${VER}-darwin-x64.dmg"><span class="name">CC-Desktop-${VER}-darwin-x64.dmg</span><br><span class="hint">Intel</span></a>
                <div class="tip">推荐按架构下载一键安装包。脚本会校验架构，并自动检查 Node.js、Claude Code CLI 和应用安装。</div>
              </div>
              <div class="footer">
                <a href="https://github.com/hydroCoderClaud/cc-desktop" target="_blank">GitHub</a>
              </div>
            </div>
          </body>
          </html>
          HTMLEOF
          aws s3 cp /tmp/index.html "s3://${{ env.R2_BUCKET }}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"

          echo "=== R2 upload complete ==="
          aws s3 ls "s3://${{ env.R2_BUCKET }}/" --endpoint-url "${{ secrets.R2_ENDPOINT }}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}

      - name: Upload to Aliyun OSS (China mirror)
        run: |
          echo "=== Uploading to Aliyun OSS ==="
          VERSION="${{ steps.version.outputs.tag }}"

          # 安装 ossutil
          wget -q https://gosspublic.alicdn.com/ossutil/v2/2.2.1/ossutil-2.2.1-linux-amd64.zip -O /tmp/ossutil.zip
          unzip -q /tmp/ossutil.zip -d /tmp/ossutil2
          mv /tmp/ossutil2/ossutil-2.2.1-linux-amd64/ossutil /tmp/ossutil
          chmod +x /tmp/ossutil

          # 清理旧的大文件（保留 blockmap 和 yml）
          echo "Cleaning old files from OSS (keeping blockmaps and yml)..."
          /tmp/ossutil rm -r -f oss://${{ secrets.OSS_BUCKET_NAME }}/${{ env.OSS_DIR }}/ \
            -e ${{ env.OSS_ENDPOINT }} \
            -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
            --sign-version v4 --region ${{ env.OSS_REGION }} \
            --exclude "*.blockmap" --exclude "*.yml" || true

          # 上传所有构建产物到 OSS（flat 目录，electron-updater 需要）
          echo "Uploading files to OSS..."
          for f in artifacts/**/*.exe artifacts/**/*.dmg artifacts/**/*.zip artifacts/**/*-installer.tar.gz artifacts/**/*.blockmap artifacts/**/latest.yml artifacts/**/latest-mac.yml artifacts/**/cc-desktop-*-windows.zip; do
            [ -f "$f" ] || continue
            BASENAME=$(basename "$f")
            echo "Uploading: $BASENAME"
            /tmp/ossutil cp -f "$f" oss://${{ secrets.OSS_BUCKET_NAME }}/${{ env.OSS_DIR }}/$BASENAME \
              -e ${{ env.OSS_ENDPOINT }} \
              -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
              -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
              --sign-version v4 --region ${{ env.OSS_REGION }}
          done

          # 复用 R2 下载页到 OSS 子目录，方便直接访问镜像目录
          /tmp/ossutil cp -f /tmp/index.html oss://${{ secrets.OSS_BUCKET_NAME }}/${{ env.OSS_DIR }}/index.html \
            -e ${{ env.OSS_ENDPOINT }} \
            -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
            --content-type "text/html; charset=utf-8" \
            --sign-version v4 --region ${{ env.OSS_REGION }}

          echo "=== Aliyun OSS upload complete ==="
          /tmp/ossutil ls oss://${{ secrets.OSS_BUCKET_NAME }}/${{ env.OSS_DIR }}/ \
            -e ${{ env.OSS_ENDPOINT }} \
            -i ${{ secrets.OSS_ACCESS_KEY_ID }} \
            -k ${{ secrets.OSS_ACCESS_KEY_SECRET }} \
            --sign-version v4 --region ${{ env.OSS_REGION }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Clean up old releases (keep latest 10)
        run: |
          echo "Fetching all releases..."
          RELEASES=$(gh api repos/${{ github.repository }}/releases --paginate --jq '.[].id')
          COUNT=0
          for id in $RELEASES; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 10 ]; then
              TAG=$(gh api "repos/${{ github.repository }}/releases/$id" --jq '.tag_name')
              echo "Deleting old release: $TAG (id: $id)"
              gh api -X DELETE "repos/${{ github.repository }}/releases/$id"
              # 同时删除对应 tag
              if [ -n "$TAG" ]; then
                gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$TAG" 2>/dev/null || true
              fi
            fi
          done
          echo "Done. Kept 10, deleted $((COUNT > 10 ? COUNT - 10 : 0)) old release(s)."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
